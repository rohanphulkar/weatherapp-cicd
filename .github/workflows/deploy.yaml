name: Deploy on VPS

on:
  push:
    branches:
      - master
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Deployment Secrets
        run: |
          if [ -z "${{ secrets.VPS_IP }}" ]; then
            echo "::error::VPS_IP is missing! Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "::error::VPS_USER is missing! Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "::error::VPS_SSH_KEY is missing! Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Set up SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/weatherapp
            git pull
            docker compose up -d --build
